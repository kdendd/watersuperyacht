<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>LRA · Hero 3D · Yacht</title>

<style>
  /* -------------------------------------------------------------
     THEME — edit these if your brand colours ever change.
     Everything text/button-related is handled in Framer, not here.
  ------------------------------------------------------------- */
  :root {
    --acc:        #B81D1D;               /* LRA signature red       */
    --acc-glow:   rgba(184, 29, 29, .45);/* red cursor glow         */
    --bg-top:     #0a0a0b;               /* showroom ceiling fade   */
    --bg-mid:     #070708;               /* centre of frame         */
    --bg-floor:   #020203;               /* floor darkness          */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 60% at 50% 45%, var(--bg-mid) 0%, var(--bg-top) 55%, #000 100%),
      linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-floor) 100%);
    /* Hide native cursor — we draw our own red one */
    cursor: none;
  }

  /* Three.js canvas sits behind everything, transparent to bg gradient */
  #scene {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Soft vignette to push focus on the car */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 55% at 50% 55%, transparent 0%, transparent 45%, rgba(0,0,0,.55) 100%);
    z-index: 2;
  }

  /* Subtle red floor glow — hints at brand colour without stealing the car */
  #floor-glow {
    position: fixed;
    left: 50%;
    bottom: -12vh;
    transform: translateX(-50%);
    width: 70vw;
    height: 30vh;
    pointer-events: none;
    background: radial-gradient(ellipse at center, var(--acc-glow) 0%, transparent 65%);
    opacity: .35;
    filter: blur(40px);
    z-index: 1;
    mix-blend-mode: screen;
  }

  /* -------------------------------------------------------------
     CUSTOM RED CURSOR  (dot + trailing ring, matches main site)
  ------------------------------------------------------------- */
  #cursor-dot,
  #cursor-ring {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: screen;
    will-change: transform;
  }
  #cursor-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--acc);
    box-shadow: 0 0 14px var(--acc-glow);
    transform: translate(-50%, -50%);
  }
  #cursor-ring {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--acc);
    transform: translate(-50%, -50%);
    transition: width .25s ease, height .25s ease, background .25s ease, opacity .2s ease;
    opacity: .8;
  }

  /* While actively dragging the car — ring swells + fills with red */
  body.dragging #cursor-ring {
    width: 68px; height: 68px;
    background: var(--acc-glow);
    border-color: var(--acc);
  }
  body.dragging #cursor-dot {
    width: 4px; height: 4px;
  }

  /* Loading state — thin red line progress */
  #loader {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0%;
    background: var(--acc);
    box-shadow: 0 0 10px var(--acc-glow);
    z-index: 10;
    transition: width .25s ease-out, opacity .4s ease;
  }

  /* CC-BY attribution (required by 3D model licence — do not remove) */
  #credit {
    position: fixed;
    right: 14px;
    bottom: 10px;
    font: 400 10px/1.2 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: 0.04em;
    color: rgba(255, 255, 255, 0.28);
    z-index: 3;
    pointer-events: auto;
    text-decoration: none;
  }
  #credit:hover { color: rgba(255, 255, 255, 0.6); }

  /* Hide the hero on touch devices if you'd rather show the MP4 fallback
     (Framer handles the fallback swap — iframe is simply not rendered on mobile) */
  @media (hover: none) {
    #cursor-dot, #cursor-ring { display: none; }
    html, body { cursor: auto; }
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div id="floor-glow"></div>
<div id="vignette"></div>
<div id="loader"></div>
<a id="credit"
   href="https://sketchfab.com/3d-models/realistic-boat-pack-2-game-ready-hq-3d-models-e90cabeec0d5434cbca4d74b7f55ed75"
   target="_blank" rel="noopener">3D · GAMICO + B1battledroid98 · CC-BY-4.0</a>

<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }  from 'three/addons/loaders/DRACOLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

/* =================================================================
   CONFIG  — edit these values to tune look & behaviour
   ================================================================= */
const CONFIG = {
  modelUrl:      'yacht.glb',         // Realistic Boat Pack 2 by GAMICO (CC-BY-4.0)
  accentColor:   0xB81D1D,            // matches --acc CSS var
  paintColor:    0x0f0f10,            // deep charcoal hull — softer than the car's jet-black
  cameraStart:   { x: 0,  y: 2.4, z: 12.0 },  // pulled back — yachts are long vessels
  cameraScrollEnd: { x: 0, y: 3.8, z: 17.0 }, // drifts even further on scroll-out
  carYStart:     0,
  carYEnd:       -0.3,
  parallaxStrength: 0.18,
  autoRotateSpeed: 0.02,
  hexagonUrl:    'led_hexagon.glb',
  hexagonY:      7.5,                 // higher to clear yacht superstructure
  hexagonScale:  2.2,                 // bigger — the whole scene is wider
  hexagonGlow:   3.2,
};

/* =================================================================
   RENDERER + SCENE
   ================================================================= */
const canvas   = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,                        // allow CSS gradient to show through
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping      = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  32, window.innerWidth / window.innerHeight, 0.1, 100
);
camera.position.set(CONFIG.cameraStart.x, CONFIG.cameraStart.y, CONFIG.cameraStart.z);
camera.lookAt(0, 0.6, 0);

/* =================================================================
   LIGHTING — dark showroom with red rim accent
   ================================================================= */
// Warm low ambient — shadows carry a hint of red warmth, never cold/blue
scene.add(new THREE.HemisphereLight(0x6a3030, 0x0a0505, 0.85));

// OVERHEAD LED PANEL — bright white from directly above, like the hexagonal
// showroom ceiling fixture in the reference image. This is what makes the
// black paint actually read as shiny/dimensional instead of a silhouette.
const overheadLight = new THREE.DirectionalLight(0xffffff, 3.4);
overheadLight.position.set(0, 10, 0.5);
overheadLight.castShadow = true;
overheadLight.shadow.mapSize.set(2048, 2048);
overheadLight.shadow.camera.near = 0.5;
overheadLight.shadow.camera.far  = 30;
overheadLight.shadow.camera.left = overheadLight.shadow.camera.bottom = -6;
overheadLight.shadow.camera.right = overheadLight.shadow.camera.top  = 6;
overheadLight.shadow.bias = -0.0005;
scene.add(overheadLight);

// Key light from upper-left — warm white sculpts the body contours
const keyLight = new THREE.DirectionalLight(0xfff4ec, 1.8);
keyLight.position.set(-4, 6, 4);
scene.add(keyLight);

// Fill from right — warm off-white (no cool blue anymore)
const fillLight = new THREE.DirectionalLight(0xfff0e0, 0.8);
fillLight.position.set(5, 3, 2);
scene.add(fillLight);

// SIGNATURE RED RIM — the brand accent on the car's silhouette
const rimRed = new THREE.SpotLight(CONFIG.accentColor, 3.5, 14, Math.PI / 5, 0.6, 1);
rimRed.position.set(3.5, 2.2, -3);
rimRed.target.position.set(0, 0.8, 0);
scene.add(rimRed, rimRed.target);

// Back-rim from behind left — deep red, keeps the moody edge without going blue
const rimBack = new THREE.SpotLight(0x7a1414, 1.6, 12, Math.PI / 4.5, 0.7, 1);
rimBack.position.set(-4, 2.6, -3.5);
rimBack.target.position.set(0, 0.6, 0);
scene.add(rimBack, rimBack.target);

/* =================================================================
   SHOWROOM FLOOR — dark reflective plane (matches Lambo hero photos)
   ================================================================= */
const floorGeo = new THREE.CircleGeometry(30, 64);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x050506,
  metalness: 0.85,
  roughness: 0.42,   // not too mirror — hints at polished concrete
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
scene.add(floor);

/* =================================================================
   LOADERS — HDR environment + car model
   ================================================================= */
const loaderBar = document.getElementById('loader');
const setLoad = (pct) => { loaderBar.style.width = pct + '%'; };
const hideLoad = () => {
  loaderBar.style.opacity = '0';
  setTimeout(() => loaderBar.remove(), 500);
};

// Draco in case the GLB is Draco-compressed (Sketchfab often is)
const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');

const gltfLoader = new GLTFLoader()
  .setDRACOLoader(draco)
  .setMeshoptDecoder(MeshoptDecoder);

// Neutral dark-studio environment — built from a tiny scene with just
// top/bottom lights and a subtle red kicker. No coloured room walls,
// so the car's chrome stays clean black + brand red, never purple/blue.
const envScene = new THREE.Scene();
const envTopLight = new THREE.Mesh(
  new THREE.SphereGeometry(50, 16, 8),
  new THREE.MeshBasicMaterial({ color: 0x151517, side: THREE.BackSide })
);
envScene.add(envTopLight);
// Warm neutral key from above — gives the roof real highlights to reflect
const envKey = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshBasicMaterial({ color: 0x9a9290 })
);
envKey.position.set(0, 12, 0);
envKey.rotation.x = Math.PI / 2;
envScene.add(envKey);
// Subtle red kicker on the right — reinforces brand colour in reflections
const envRed = new THREE.Mesh(
  new THREE.PlaneGeometry(6, 14),
  new THREE.MeshBasicMaterial({ color: 0x6a1414 })
);
envRed.position.set(8, 3, -4);
envRed.rotation.y = -Math.PI / 3;
envScene.add(envRed);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(envScene, 0.08).texture;
setLoad(20);
loadCar();
loadOverheadHexagon();

/* =================================================================
   OVERHEAD LED HEXAGON — the bright ceiling fixture from your reference
   image (CC-BY-4.0 by B1battledroid98). Makes white LEDs emissive so
   they self-glow, and positions it above the car.
   ================================================================= */
function loadOverheadHexagon() {
  gltfLoader.load(CONFIG.hexagonUrl, (gltf) => {
    const hex = gltf.scene;

    // Centre + scale the hexagon prop, hang it overhead facing DOWN so
    // the LED side points at the car (most GLBs ship it flat on XZ plane,
    // but safer to enforce the orientation either way).
    const hbox = new THREE.Box3().setFromObject(hex);
    const hcentre = hbox.getCenter(new THREE.Vector3());
    hex.position.x -= hcentre.x;
    hex.position.z -= hcentre.z;
    hex.scale.setScalar(CONFIG.hexagonScale);
    hex.position.y = CONFIG.hexagonY;

    // Colocated soft white light so the hexagon actually illuminates the
    // car below, not just glows in empty air
    const hexLight = new THREE.PointLight(0xffffff, 2.0, 10, 1.5);
    hexLight.position.set(0, CONFIG.hexagonY - 0.3, 0);
    scene.add(hexLight);

    // Make the LED strips self-emissive so they visibly glow like real LEDs
    hex.traverse((node) => {
      if (!node.isMesh || !node.material) return;
      const mat = node.material;
      // White or light-toned material = likely the LED strip
      const looksLikeLed =
        /led|light|strip|tube|neon|glow/i.test(node.name || '') ||
        (mat.color && mat.color.r > 0.8 && mat.color.g > 0.8 && mat.color.b > 0.8);
      if (looksLikeLed) {
        node.material = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          emissive: 0xffffff,
          emissiveIntensity: CONFIG.hexagonGlow,
          roughness: 0.4,
          metalness: 0,
        });
      } else {
        // Frame / housing — keep dark and matte
        node.material = new THREE.MeshStandardMaterial({
          color: 0x0a0a0a,
          metalness: 0.3,
          roughness: 0.7,
        });
      }
    });

    scene.add(hex);
  }, undefined, (err) => {
    console.warn('LED hexagon optional prop failed to load:', err);
  });
}

/* =================================================================
   CAR — load, centre, scale, paint, and set up for scroll-driven motion
   ================================================================= */
let car = null;      // THREE.Group wrapping the loaded model
let carPivot = null; // outer pivot we rotate on idle (doesn't fight scale)

function loadCar() {
  gltfLoader.load(
    CONFIG.modelUrl,
    (gltf) => {
      const model = gltf.scene;

      // Normalise scale + ground the car so wheels sit on floor plane
      const box    = new THREE.Box3().setFromObject(model);
      const size   = box.getSize(new THREE.Vector3());
      const centre = box.getCenter(new THREE.Vector3());
      const targetLength = 9.0;                    // yachts are much longer than cars
      const scale  = targetLength / Math.max(size.x, size.z);
      model.scale.setScalar(scale);
      box.setFromObject(model);
      model.position.x -= (box.min.x + box.max.x) / 2;
      model.position.z -= (box.min.z + box.max.z) / 2;
      model.position.y -= box.min.y;               // wheels → y=0

      // This GLB (BlackCube's Aventador, CC-BY-4.0) is a clean car model
      // with no baked scenery — no backdrop, no light bars, no wallpaper.
      // So: no filtering. Every mesh is real car geometry, keep it all.

      // Apply jet-black luxury paint to obvious body panels; glass stays glass.
      // We don't assume mesh names — we categorise by current material props,
      // so this works on any Aventador/Lambo GLB you swap in later.
      model.traverse((node) => {
        if (!node.isMesh || !node.visible) return;
        node.castShadow = true;
        node.receiveShadow = true;

        const mat = node.material;
        if (!mat) return;

        // Detect glass-like meshes (transparent or very low roughness + low opacity)
        const looksLikeGlass =
          mat.transparent === true ||
          (mat.opacity !== undefined && mat.opacity < 0.9) ||
          /glass|window|windshield|shield/i.test(node.name || '');

        if (looksLikeGlass) {
          node.material = new THREE.MeshPhysicalMaterial({
            color: 0x0a0a0a,
            metalness: 0,
            roughness: 0.05,
            transmission: 0.9,
            transparent: true,
            opacity: 0.35,
            ior: 1.5,
          });
          return;
        }

        // Detect body paint (large-ish mesh, typically "body"/"paint"/"carpaint" named)
        const isBodyLike = /body|paint|carpaint|exterior|shell/i.test(node.name || '');
        if (isBodyLike) {
          node.material = new THREE.MeshPhysicalMaterial({
            color: CONFIG.paintColor,
            metalness: 0.9,
            roughness: 0.28,
            clearcoat: 1,
            clearcoatRoughness: 0.08,
          });
          return;
        }

        // Detect brake calipers / accents — paint them signature red
        if (/caliper|brake/i.test(node.name || '')) {
          node.material = new THREE.MeshStandardMaterial({
            color: CONFIG.accentColor,
            metalness: 0.3,
            roughness: 0.35,
          });
          return;
        }

        // Otherwise leave original material but ensure it picks up env reflections
        if (mat.envMapIntensity !== undefined) mat.envMapIntensity = 1.1;
      });

      // Wrap in a pivot so we can rotate without disturbing layout maths
      carPivot = new THREE.Group();
      carPivot.add(model);
      carPivot.position.y = CONFIG.carYStart;
      scene.add(carPivot);
      car = model;

      setLoad(100);
      hideLoad();
    },
    (evt) => {
      if (evt.total) setLoad(30 + (evt.loaded / evt.total) * 65);
    },
    (err) => {
      console.error('Failed to load car GLB:', err);
      loaderBar.style.background = '#ff4444';
    }
  );
}

/* =================================================================
   SCROLL-REACTIVE CAMERA
   ------------------------------------------------------------------
   Works both when the iframe is scrolled directly AND when its parent
   Framer page scrolls — we listen to parent via postMessage, plus our
   own window.scrollY as a fallback.
   ================================================================= */
let scrollProgress = 0;   // 0 = hero fully in view, 1 = scrolled fully past
const lerp = (a, b, t) => a + (b - a) * t;

// Parent Framer page can post { scrollProgress: 0..1 } for perfect sync
window.addEventListener('message', (e) => {
  if (e.data && typeof e.data.scrollProgress === 'number') {
    scrollProgress = Math.max(0, Math.min(1, e.data.scrollProgress));
  }
});

// Fallback — if the iframe itself is scrollable
window.addEventListener('scroll', () => {
  const max = Math.max(1, document.body.scrollHeight - window.innerHeight);
  scrollProgress = Math.min(1, window.scrollY / max);
}, { passive: true });

// Forward wheel scrolls to the parent Framer page so scrolling over the
// hero doesn't feel trapped / sticky inside the iframe
window.addEventListener('wheel', (e) => {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ heroWheelDeltaY: e.deltaY }, '*');
  }
}, { passive: true });

/* =================================================================
   MOUSE PARALLAX + DRAG-TO-ROTATE + CUSTOM CURSOR
   ================================================================= */
const mouse = { x: 0, y: 0, rawX: 0, rawY: 0 };
const cursorDot  = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');
let ringX = 0, ringY = 0;

// Drag-to-rotate state
let isDragging = false;
let lastPointerX = 0;
let dragVelocity = 0;           // radians per frame, decays when released
let userRotation = 0;           // accumulates from drags
let lastInteractionTime = 0;    // used to pause auto-rotate briefly after drag

window.addEventListener('pointermove', (e) => {
  mouse.rawX = e.clientX;
  mouse.rawY = e.clientY;
  mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
  cursorDot.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;

  if (isDragging) {
    const deltaX = e.clientX - lastPointerX;
    lastPointerX = e.clientX;
    // 1px drag → ~0.01 radian rotation; feels natural
    dragVelocity = deltaX * 0.01;
    userRotation += dragVelocity;
    lastInteractionTime = performance.now();
  }
});

canvas.addEventListener('pointerdown', (e) => {
  isDragging = true;
  lastPointerX = e.clientX;
  dragVelocity = 0;
  document.body.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
});

const endDrag = (e) => {
  if (!isDragging) return;
  isDragging = false;
  document.body.classList.remove('dragging');
  if (e && e.pointerId !== undefined && canvas.hasPointerCapture(e.pointerId)) {
    canvas.releasePointerCapture(e.pointerId);
  }
};
canvas.addEventListener('pointerup',     endDrag);
canvas.addEventListener('pointercancel', endDrag);
canvas.addEventListener('pointerleave',  endDrag);

/* =================================================================
   RESIZE
   ================================================================= */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* =================================================================
   ANIMATE
   ================================================================= */
const clock = new THREE.Clock();

function animate() {
  const dt = clock.getDelta();

  // Car rotation: slow auto-rotate + user drag + momentum decay
  if (carPivot) {
    const idleMs = performance.now() - lastInteractionTime;
    const autoRotateGate = lastInteractionTime === 0 || idleMs > 1500;

    if (!isDragging) {
      // Decay leftover drag momentum
      if (Math.abs(dragVelocity) > 0.0001) {
        userRotation += dragVelocity;
        dragVelocity *= 0.92;   // momentum friction
      }
      // Very slow idle turntable, pauses briefly after the user drags
      if (autoRotateGate) {
        userRotation += CONFIG.autoRotateSpeed * dt;
      }
    }

    carPivot.rotation.y = userRotation;

    // Scroll drives car vertical drift
    carPivot.position.y = lerp(CONFIG.carYStart, CONFIG.carYEnd, scrollProgress);
  }

  // Scroll drives camera pull-back
  const targetZ = lerp(CONFIG.cameraStart.z, CONFIG.cameraScrollEnd.z, scrollProgress);
  const targetY = lerp(CONFIG.cameraStart.y, CONFIG.cameraScrollEnd.y, scrollProgress);

  // Mouse parallax adds a subtle camera tilt
  const parallaxX = mouse.x * CONFIG.parallaxStrength;
  const parallaxY = -mouse.y * CONFIG.parallaxStrength * 0.6;

  camera.position.x = lerp(camera.position.x, parallaxX, 0.05);
  camera.position.y = lerp(camera.position.y, targetY + parallaxY, 0.06);
  camera.position.z = lerp(camera.position.z, targetZ, 0.06);
  camera.lookAt(0, 0.7, 0);

  // Cursor ring snaps to the pointer — no lag, no stickiness
  cursorRing.style.transform = `translate(${mouse.rawX}px, ${mouse.rawY}px) translate(-50%, -50%)`;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
